name: Deploy to Trigger.dev (prod)

on:
  push:
    branches:
      - main
    paths:
      - "src/trigger/**"
      - "src/airlines/**"
      - "src/db/**"
      - "src/llm/**"
      - "src/lib/**"
      - "src/config/**"
      - "src/observability/**"
      - "trigger.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-trigger-prod.yml"
  workflow_dispatch:

concurrency:
  group: trigger-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Deploy Trigger.dev (prod)
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: npx trigger.dev@4.5.6 deploy
